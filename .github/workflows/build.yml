name: Build Module
run-name: Build ${{ inputs.module_path }} on ${{ inputs.branch }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Kernel branch (e.g., android16-6.12, android15-6.6)'
        required: true
        default: 'android16-6.12'
      ddk_version:
        description: 'DDK version (default: 20260313)'
        required: false
        default: '20260313'
      module_path:
        description: 'Module relative path in kernel tree (e.g., net/unix or net/netfilter/ipset)'
        required: true
        # default: 'net/netfilter'
        # default: 'net/ipv6/netfilter'
        default: 'net/netfilter'
      configs:
        description: 'Options pass to scripts/config, e.g., -m CONFIG_UNIX_DIAG or -m CONFIG_IP_SET' # ./scripts/config --set-val CONFIG_IP_SET_MAX 65534
        required: false
        default: '--set-val CONFIG_IP_SET_MAX 65534 -d NETFILTER_XTABLES_COMPAT -m CONFIG_IP_SET -m CONFIG_IP_SET_HASH_NET -m CONFIG_IP_SET_LIST_SET -m CONFIG_NETFILTER_XT_MATCH_ADDRTYPE -m CONFIG_NETFILTER_XT_SET' # 给 config 参数加上 -d NETFILTER_XTABLES_COMPAT 再重新编译，因为小米内核没开这个，但是 gki 内核开了，会导致结构不一样 
        # default: '-m CONFIG_IP6_NF_NAT -m CONFIG_IP6_NF_TARGET_MASQUERADE'

jobs:
  build-ko:
    name: Build module
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:${{ inputs.branch }}-${{ inputs.ddk_version }}
      options: --privileged

    steps:
    - name: Build 
      run: |
        BRANCH=${{ inputs.branch }}
        MODULE_PATH=${{ inputs.module_path }}
        CONFIGS="${{ inputs.configs }}"
        
        SRC=/opt/ddk/src/$BRANCH
        mkdir out
        OUT=$(realpath out)
        make -C $SRC O=$OUT gki_defconfig
        
        # Build config parameters from the input
        CONFIG_ARGS="$CONFIGS"
        
        # Apply CONFIG_CFI_ICALL_NORMALIZE_INTEGERS only for android16-6.12
        if [ "$BRANCH" = "android16-6.12" ]; then
          CONFIG_ARGS="$CONFIG_ARGS -e CONFIG_CFI_ICALL_NORMALIZE_INTEGERS"
        fi
        
        $SRC/scripts/config --file $OUT/.config $CONFIG_ARGS
        make -C $SRC O=$OUT olddefconfig
        make -C $SRC O=$OUT modules_prepare
        make -C $SRC O=$OUT M=$SRC/net/netfilter/ipset M=$SRC/net/netfilter modules # CONFIG_IP_SET_MAX=65534 make -C $SRC O=$OUT M=$SRC/net/netfilter/ipset M=$SRC/net/netfilter modules
        # make -C $SRC O=$OUT M=$SRC/net/ipv6/netfilter modules

    - name: Upload kernel modules
      uses: actions/upload-artifact@v7
      with:
        name: modules
        path: /opt/ddk/src/${{ inputs.branch }}/${{ inputs.module_path }}/**/*.ko
